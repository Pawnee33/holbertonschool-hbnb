<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Review</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <!-- Header -->
    <header>
        <div>
            <nav>
                <a href="index.html">
                <img src="images/logo.png" alt="Hbnb logo" class="logo">
            </a>
            </nav>
        </div>
        <nav>
            <a href="login.html" id="login-link" class="login-button">Login</a>
        </nav>
    </header>
    <main>
        <!-- Add something to idfentify the place you're reviewing -->
        <h2><strong>Reviewing:</strong> Beautiful Beach House</h2>
        <section id="add-review" class="add-review">
            <h3><strong>Add a Review</strong></h3>
            <form id="review-form" class="form">
                <label for="review"><strong>Your Review:</strong></label>
                <textarea id="review" name="review" required></textarea>
                <label for="rating">Rating:</label>
                <select id="rating" name="rating" required>
                    <!-- Options for rating -->
                        <option value="">-- Select a rating --</option>
                        <option value="1">★</option>
                        <option value="2">★★</option>
                        <option value="3">★★★</option>
                        <option value="4">★★★★</option>
                        <option value="5">★★★★★</option>
                </select>
            <button type="submit">Submit Review</button>
        </form>
        </section>
    </main>

    <!-- footer -->
    <footer>
        <p>&copy; 2026 HBNB. All rights reserved</p>
    </footer>
    <script src="scripts.js"></script>
</body>
</html>
