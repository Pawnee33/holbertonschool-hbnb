<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Review</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" type="image/png" href="images/icon.png">
</head>
<body>

    <!-- Header -->
    <header>
        <div>
            <nav>
                <a href="index.html">
                <img src="images/logo.png" alt="Hbnb logo" class="logo">
            </a>
            </nav>
        </div>
        <nav>
            <a href="login.html" id="login-link" class="login-button">Login</a>
            <button id="logout-button" onclick="logout()">Logout</button>
        </nav>
    </header>
    <main>
        <!-- Add something to idfentify the place you're reviewing -->
        <h2 id="place-title"><strong>Reviewing:</strong> </h2>
        <section id="add-review" class="add-review">
            <h3><strong>Add a Review</strong></h3>
            <form id="review-form" class="form">
                <label for="review"><strong>Your Review:</strong></label>
                <textarea id="review" name="review" required></textarea>
                <label for="rating">Rating:</label>
                <div id="star-rating">
                    <span class="star" data-value="1">☆</span>
                    <span class="star" data-value="2">☆</span>
                    <span class="star" data-value="3">☆</span>
                    <span class="star" data-value="4">☆</span>
                    <span class="star" data-value="5">☆</span>
                </div>
                <input type="hidden" id="rating" value="">
            <button type="submit">Submit Review</button>
        </form>
        </section>
    </main>

    <!-- footer -->
    <footer>
        <p>&copy; 2026 HBNB. All rights reserved</p>
    </footer>
    <script src="scripts.js"></script>
</body>
</html>
