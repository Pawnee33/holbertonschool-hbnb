<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>List of Places</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" type="image/png" href="images/icon.png">
</head>
<body>

    <!-- Header -->
    <header>
        <div>
            <nav>
                <a href="index.html">
                <img src="images/logo.png" alt="Hbnb logo" class="logo">
            </a>
            </nav>
        </div>
        <nav>
            <a href="login.html" id="login-link" class="login-button">Login</a>
            <button id="logout-button" onclick="logout()">Logout</button>
        </nav>
    </header>
    <main>
        <div id="filter">
            <label for="price-filter">Max Price:</label>
            <select id="price-filter">
                <!-- Options will be populated dynamically -->
                <option value="10">10</option>
                <option value="50">50</option>
                <option value="100">100</option>
                <option value="All">All</option>
            </select>
        </div>
        <section id="places-list">

            <!-- List of places will be populated dynamically -->
            <div class="place-card">
                <h2>Beautiful Beach House</h2>
                <p>Price per night: $150</p>
                <button type="button" class="details-button" onclick="window.location.href='place.html'">View Details</button>
            </div>
            <div class="place-card">
                <h2>Cozy Cabin</h2>
                <p>Price per night: $100</p>
                <button type="button" class="details-button" onclick="window.location.href='place.html'">View Details</button>
            </div>
            <div class="place-card">
                <h2>Modern Apartment</h2>
                <p>Price per night: $200</p>
                <button type="button" class="details-button" onclick="window.location.href='place.html'">View Details</button>
            </div>
        </section>
    </main>

    <!-- footer -->
    <footer>
        <p>&copy; 2026 HBNB. All rights reserved</p>
    </footer>
    <script src="scripts.js"></script>
</body>
</html>
