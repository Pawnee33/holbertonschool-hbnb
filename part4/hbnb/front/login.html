<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" type="image/png" href="images/icon.png">
</head>
<body>

    <!-- Header -->
    <header>
        <div>
            <nav>
                <a href="index.html">
                <img src="images/logo.png" alt="Hbnb logo" class="logo">
            </a>
            </nav>
        </div>
        <nav>
            <a href="index.html" id="login-link" class="login-button">Home</a>
            <button id="logout-button" onclick="logout()">Logout</button>
        </nav>
    </header>
    <main class="login-main">
        <form id="login-form" class="login-card">
            <h2>Login</h2>
            <div class="input-group">
                <span>✉</span>
                <input type="email" id="email" name="email" placeholder="Email" required>
            </div>
            <div class="input-group">
                <span>🔒</span>
                <input type="password" id="password" name="password" placeholder="Password" required>
            </div>
            <div class="login-buttons-row">
                <button type="submit" class="login-btn">LOGIN</button>
                <a href="register.html" class="login-btn">REGISTER</a>
            </div>
        </form>
    </main>

    <!-- footer -->
    <footer>
        <p>&copy; 2026 HBNB. All rights reserved</p>
    </footer>
    <script src="scripts.js"></script>
</body>
</html>
